# Monte Carlo Localization (MCL) node parameters
# Use with: python3 mcl_node.py --config config/mcl_params.yaml
# Or:       python3 localization.py --config config/mcl_params.yaml
# Or:       python3 mcl_node.py --ros-args --params-file config/mcl_params.yaml
# From launch: pass this file via Node(..., parameters=[config_file])

mcl_node:
  ros__parameters:
    # Frames
    map_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    # Topics
    scan_topic: "scan"
    odom_topic: "odom"
    map_topic: "map"
    initial_pose_topic: "initialpose"

    # Particle filter (tuned for faster convergence with good initial pose)
    num_particles: 1000
    resample_interval: 5   # also resample every N updates (0 = only when N_eff < resample_alpha*N)
    resample_alpha: 0.5
    min_updates_before_resample: 2
    resample_first_n_updates: 5   # resample every update for first N (fast convergence after initial pose)
    recovery_n_eff_ratio: 0.0      # 0 = disabled. Was injecting particles when N_eff low but often diluted the cloud; re-enable (e.g. 0.05) to try recovery.
    recovery_fraction: 0.1
    recovery_min_updates: 25
    recovery_around_estimate_fraction: 0.5
    recovery_around_std_xy: 0.5
    update_min_d: 0.02
    update_min_a: 0.05
    update_ignore_motion_first_n: 60   # run on every scan for first 60 updates (~6 s at 10 Hz); then use motion threshold
    # Initial cloud spread (params used when initial_pose_params_override is true; RViz cannot set covariance)
    initial_pose_std_xy: 0.02
    initial_pose_std_theta: 0.01
    initial_pose_params_override: true   # true = always use params above; false = use message covariance when present

    # Motion model noise (tighter alphas = less spread, measurement focuses cloud faster)
    motion_noise_scale: 1.0
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1

    # Sensor: laser position in base_footprint (from URDF or tf2_echo base_footprint base_laser_front_link)
    laser_origin_x: 0.45
    laser_origin_y: 0.0
    # Use all beams when scan has <= max_beams (e.g. 150-beam scan uses all 150). Set >= your laser beam count.
    max_beams: 360
    sigma_hit: 0.1   # smaller = peakier likelihood, faster convergence (0.25 = flatter, less discriminative)
    likelihood_max_dist: 2.0
    # Map / environment discrepancy (manual or auto-generated map, new obstacles in env)
    map_uncertainty_scale: 0.1   # sigma_eff = sigma_hit * (1 + this); 0 = trust map fully
    z_max_log_likelihood: -4.6  # log prob for max-range beams (~0.01); "obstacle not in map" / sensor limit
    max_range_ratio_for_z_max: 0.98  # beam is max-range when r >= max_range * this

    # Output (RViz: pose, PoseWithCovariance, PoseArray, Path)
    publish_pose_topic: "mean_pose"
    publish_pose_with_covariance_topic: "pose_with_covariance"
    publish_particle_cloud_topic: "particle_cloud"
    particle_cloud_publish_rate: 5.0
    publish_path_topic: "path"
    path_max_poses: 100
    # Path decay: only show poses from the last N seconds (0 = disabled, path stays by path_max_poses)
    path_decay_time: 0.0
    # Republish map->odom at this rate when idle so the transform does not expire (Hz; 0 = disable)
    tf_publish_rate: 1.0
